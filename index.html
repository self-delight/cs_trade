<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS2 关中Major · 队员交易平台</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e1e4ed;
      --text-secondary: #a0a6bb;
      --primary: #5b8def;
      --primary-hover: #4a7de0;
      --danger: #e5534b;
      --danger-hover: #d03d35;
      --accent: #36d399;
      --warning: #f0b74a;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 1000px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--primary), #a18cd1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .auth-panel {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .auth-panel input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      width: 160px;
      font-size: 0.9rem;
    }
    .btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn:active { transform: scale(0.96); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: var(--surface); }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: var(--danger-hover); }
    .btn-sm { padding: 4px 10px; font-size: 0.8rem; }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .team-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: box-shadow 0.2s;
    }
    .team-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .team-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .team-name {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .team-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .team-budget {
      background: #2a2e3e;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .player-tag {
      background: #252836;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    .player-tag:hover { background: #2f3445; }
    .player-price {
      background: var(--accent);
      color: #000;
      border-radius: 10px;
      padding: 0 6px;
      font-size: 0.7rem;
      font-weight: bold;
      margin-left: 4px;
    }
    .player-rank {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    .trade-highlight {
      border-color: var(--primary);
      background: #25304a;
    }

    .pending-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 30px;
    }
    .pending-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .trade-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e2130;
      padding: 12px 16px;
      border-radius: 8px;
    }
    .trade-info {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .trade-actions {
      display: flex;
      gap: 8px;
    }
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      width: 90%;
      max-width: 500px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .close-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .hidden { display: none !important; }
    .text-muted { color: var(--text-secondary); font-size: 0.85rem; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .badge-full { background: #4f6ef7; color: white; }
    .badge-elite { background: #f0b74a; color: #000; }
    @media (max-width: 600px) {
      .teams-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>🎯 CS2  关中Major· 交易市场</h1>
    <div id="authContainer" class="auth-panel">
      <!-- 登录前显示 -->
      <input type="email" id="loginEmail" placeholder="队长邮箱" />
      <input type="password" id="loginPassword" placeholder="密码" />
      <button class="btn" onclick="signUp()">注册</button>
      <button class="btn" onclick="signIn()">登录</button>
    </div>
    <div id="userPanel" class="auth-panel hidden">
      <span id="userEmailDisplay" class="text-muted"></span>
      <button class="btn btn-outline btn-sm" onclick="signOut()">退出</button>
    </div>
  </header>

  <!-- 队伍列表容器 -->
  <div id="teamsContainer" class="teams-grid"></div>

  <!-- 待处理交易请求（仅队长可见） -->
  <div id="pendingContainer" class="pending-section hidden">
    <h2 style="margin-bottom:15px;">📬 收到的交易请求</h2>
    <div id="pendingList" class="pending-list"></div>
  </div>

  <!-- 交易发起模态框 -->
  <div id="tradeModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>发起交易</h3>
        <button class="close-btn" onclick="closeTradeModal()">&times;</button>
      </div>
      <p><strong>本方球员：</strong><span id="modalFromPlayer"></span></p>
      <p><strong>目标球队：</strong><span id="modalToTeam"></span></p>
      <p><strong>目标球员：</strong><span id="modalToPlayer"></span></p>
      <p><strong>身价差：</strong><span id="modalPriceDiff"></span></p>
      <p id="modalWarning" class="text-muted"></p>
      <div style="margin-top:20px; display:flex; gap:10px; justify-content:flex-end;">
        <button class="btn btn-outline" onclick="closeTradeModal()">取消</button>
        <button class="btn" id="confirmTradeBtn" onclick="submitTrade()">确认发起</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ==================== 配置 Supabase ====================
  const SUPABASE_URL = 'https://pscuaajkfzcwibzsrlan.supabase.co';   // 替换
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzY3VhYWprZnpjd2lienNybGFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2Nzk5MjYsImV4cCI6MjA5OTI1NTkyNn0.qZDwZxRDsYCR279E6gj3BZbjklPY9x3MFHTphPJBX-k';                // 替换
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ==================== 全局状态 ====================
  let currentUser = null;
  let teamsData = [];           // 所有队伍（含队员）
  let teamPrices = {};         // 队伍当前总价 {id: total}
  let pendingTradeId = null;   // 模态框中暂存的交易数据
  let pendingFromPlayer = null;
  let pendingToPlayer = null;

  // ==================== 认证逻辑 ====================
  async function signUp() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return alert('请输入邮箱和密码');
    const { error } = await supabase.auth.signUp({ email, password });
    alert(error ? error.message : '注册成功，请登录（邮箱验证已关闭）');
  }

  async function signIn() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) return alert(error.message);
    currentUser = data.user;
    updateAuthUI();
    loadAllData();
  }

  async function signOut() {
    await supabase.auth.signOut();
    currentUser = null;
    updateAuthUI();
    document.getElementById('teamsContainer').innerHTML = '';
    document.getElementById('pendingContainer').classList.add('hidden');
  }

  function updateAuthUI() {
    if (currentUser) {
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('userPanel').classList.remove('hidden');
      document.getElementById('userEmailDisplay').innerText = currentUser.email;
    } else {
      document.getElementById('authContainer').classList.remove('hidden');
      document.getElementById('userPanel').classList.add('hidden');
    }
  }

  // 检查已登录状态（刷新页面恢复）
  async function checkSession() {
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
      currentUser = user;
      updateAuthUI();
      loadAllData();
    }
  }
  checkSession();

  // ==================== 数据加载 ====================
  async function loadAllData() {
    await Promise.all([loadTeams(), loadPrices()]);
    renderTeams();
    if (currentUser) {
      loadPendingTrades();
    }
  }

  async function loadTeams() {
    const { data, error } = await supabase
      .from('teams')
      .select('*, players(*)')
      .order('name');
    if (error) console.error(error);
    else teamsData = data || [];
  }

  async function loadPrices() {
    const { data, error } = await supabase
      .from('team_current_price')
      .select('*');
    if (!error && data) {
      data.forEach(p => { teamPrices[p.id] = p.total_price; });
    }
  }

  // ==================== 渲染界面 ====================
  function renderTeams() {
    const container = document.getElementById('teamsContainer');
    if (!teamsData.length) {
      container.innerHTML = '<p class="text-muted">暂无队伍数据</p>';
      return;
    }
    container.innerHTML = teamsData.map(team => {
      const currentPrice = teamPrices[team.id] || 0;
      const players = team.players || [];
      const playerTags = players.map(p => {
        let extraClass = '';
        // 高亮当前队长选中的本队队员（用于交易）—— 动态处理在JS中
        return `
          <span class="player-tag" 
                data-player-id="${p.id}" 
                data-team-id="${team.id}"
                onclick="onPlayerClick('${p.id}', '${team.id}')">
            ${p.name} <span class="player-rank">${p.rank}</span>
            <span class="player-price">${p.price}币</span>
          </span>`;
      }).join('');

      const typeBadge = team.type === 'full' 
        ? '<span class="badge badge-full">满编</span>' 
        : '<span class="badge badge-elite">精英</span>';

      return `
        <div class="team-card">
          <div class="team-header">
            <div>
              <span class="team-name">${team.name}</span>
              ${typeBadge}
            </div>
            <div class="team-budget">
              🪙 ${currentPrice} / ${team.budget_cap}
            </div>
          </div>
          <div class="player-list">${playerTags}</div>
        </div>`;
    }).join('');

    // 若已登录，标记当前用户所属队伍（用于交易发起方）
    if (currentUser) {
      highlightOwnTeamPlayers();
    }
  }

  // 高亮当前队长自己队伍的球员（视觉提示）
  async function highlightOwnTeamPlayers() {
    if (!currentUser) return;
    const { data: myTeam } = await supabase
      .from('teams')
      .select('id')
      .eq('captain_id', currentUser.id)
      .single();
    if (!myTeam) return;
    document.querySelectorAll('.player-tag').forEach(el => {
      if (el.dataset.teamId === myTeam.id) {
        el.classList.add('trade-highlight');
      } else {
        el.classList.remove('trade-highlight');
      }
    });
  }

  // ==================== 交易交互 ====================
  function onPlayerClick(playerId, teamId) {
    if (!currentUser) return alert('请先登录队长账号');
    // 检查当前用户是否队长
    supabase.from('teams').select('id').eq('captain_id', currentUser.id).single()
      .then(({ data: myTeam }) => {
        if (!myTeam) return alert('你不是任何队伍的队长，无法发起交易');
        if (teamId === myTeam.id) {
          // 点击了自己队伍的球员：设为交易本方球员
          pendingFromPlayer = playerId;
          alert('已选择本方球员：' + playerId + '，现在请点击目标球队的球员');
        } else {
          // 点击了其他球队球员：需要先选好本方球员
          if (!pendingFromPlayer) {
            return alert('请先点击本队（高亮边框）的一名球员作为交易筹码');
          }
          pendingToPlayer = playerId;
          openTradeModal(myTeam.id, teamId);
        }
      });
  }

  async function openTradeModal(fromTeamId, toTeamId) {
    // 获取两名球员信息
    const [{ data: fromP }, { data: toP }] = await Promise.all([
      supabase.from('players').select('*').eq('id', pendingFromPlayer).single(),
      supabase.from('players').select('*').eq('id', pendingToPlayer).single()
    ]);
    if (!fromP || !toP) return alert('球员数据异常');
    const diff = Math.abs(fromP.price - toP.price);
    document.getElementById('modalFromPlayer').innerText = `${fromP.name} (${fromP.price}币)`;
    document.getElementById('modalToTeam').innerText = toP.team_id;
    document.getElementById('modalToPlayer').innerText = `${toP.name} (${toP.price}币)`;
    document.getElementById('modalPriceDiff').innerText = diff;
    const warnEl = document.getElementById('modalWarning');
    if (diff > 1) {
      warnEl.innerText = '⚠️ 身价差距超过1，不符合规则！';
      document.getElementById('confirmTradeBtn').disabled = true;
    } else {
      // 进一步检查工资帽（模拟交换后）
      const fromCurrent = teamPrices[fromTeamId] || 0;
      const toCurrent = teamPrices[toTeamId] || 0;
      const fromTeam = teamsData.find(t => t.id === fromTeamId);
      const toTeam = teamsData.find(t => t.id === toTeamId);
      const newFromTotal = fromCurrent - fromP.price + toP.price;
      const newToTotal = toCurrent - toP.price + fromP.price;
      if (newFromTotal > fromTeam.budget_cap || newToTotal > toTeam.budget_cap) {
        warnEl.innerText = '⚠️ 交易后工资帽超出！无法发起';
        document.getElementById('confirmTradeBtn').disabled = true;
      } else {
        warnEl.innerText = '✅ 符合交易规则';
        document.getElementById('confirmTradeBtn').disabled = false;
      }
    }
    document.getElementById('tradeModal').classList.remove('hidden');
  }

  function closeTradeModal() {
    document.getElementById('tradeModal').classList.add('hidden');
    pendingFromPlayer = null;
    pendingToPlayer = null;
  }

  async function submitTrade() {
    if (!pendingFromPlayer || !pendingToPlayer) return;
    const [{ data: fromP }, { data: toP }] = await Promise.all([
      supabase.from('players').select('*').eq('id', pendingFromPlayer).single(),
      supabase.from('players').select('*').eq('id', pendingToPlayer).single()
    ]);
    // 插入交易请求
    const { error } = await supabase.from('trades').insert({
      from_team_id: fromP.team_id,
      to_team_id: toP.team_id,
      from_player_id: pendingFromPlayer,
      to_player_id: pendingToPlayer,
      from_price: fromP.price,
      to_price: toP.price,
      created_by: currentUser.id,
      status: 'pending'
    });
    if (error) {
      alert('发起失败：' + error.message);
    } else {
      alert('交易请求已发送！');
      closeTradeModal();
      loadAllData(); // 刷新列表
    }
  }

  // ==================== 接收交易处理 ====================
  async function loadPendingTrades() {
    const container = document.getElementById('pendingContainer');
    const list = document.getElementById('pendingList');
    if (!currentUser) {
      container.classList.add('hidden');
      return;
    }
    // 获取当前用户的队长队伍
    const { data: myTeam } = await supabase
      .from('teams')
      .select('id, name')
      .eq('captain_id', currentUser.id)
      .single();
    if (!myTeam) {
      container.classList.add('hidden');
      return;
    }
    const { data: trades } = await supabase
      .from('trades')
      .select('*')
      .eq('to_team_id', myTeam.id)
      .eq('status', 'pending');
    if (!trades || trades.length === 0) {
      container.classList.add('hidden');
      return;
    }
    container.classList.remove('hidden');
    list.innerHTML = trades.map(t => `
      <div class="trade-item">
        <div class="trade-info">
          <span>从 <strong>${t.from_team_id}</strong> 用 
            <em>${t.from_player_id} (${t.from_price}币)</em> 
            换你的 <em>${t.to_player_id} (${t.to_price}币)</em>
          </span>
          <span class="text-muted">差价 ${t.price_diff}</span>
        </div>
        <div class="trade-actions">
          <button class="btn btn-sm" onclick="acceptTrade(${t.id})">同意</button>
          <button class="btn btn-sm btn-outline" onclick="rejectTrade(${t.id})">拒绝</button>
        </div>
      </div>
    `).join('');
  }

  async function acceptTrade(tradeId) {
    // 调用后端函数安全执行交易
    const { error } = await supabase.rpc('execute_trade', { trade_id: tradeId });
    if (error) {
      alert('交易失败：' + error.message);
    } else {
      alert('交易成功！阵容已更新');
      loadAllData();
    }
  }

  async function rejectTrade(tradeId) {
    const { error } = await supabase
      .from('trades')
      .update({ status: 'rejected' })
      .eq('id', tradeId);
    if (error) alert('操作失败');
    else loadAllData();
  }

  // ==================== 定时刷新（每30秒） ====================
  setInterval(() => {
    if (currentUser) loadAllData();
  }, 30000);
</script>
</body>
</html>
